profile = "prod"

[server]
addr = "0.0.0.0"
port = 8_080

# Per-client-IP rate limiting, enabled for production.
# `SmartIpKeyExtractor` reads X-Forwarded-For / X-Real-IP, so this works
# correctly behind a reverse proxy (the typical ZoneMinder deployment).
[server.middleware]
body_limit_bytes = 2097152
rate_limit_per_second = 25
rate_limit_burst = 50

# Database configuration
# By default, uses ZoneMinder's zm.conf settings (/etc/zm/zm.conf + conf.d/)
# Override here or via environment variables (APP_DB__HOST, etc.) if needed
[db]
# These placeholder values trigger zm.conf fallback
host = "localhost"
port = 3306
username = "username"
password = "password"
database_name = "database_name"
max_connections = 25

[sentry]
enabled = false
dsn = ""

[secret]
private_access_key = "/var/lib/zm_api/keys/private_access_rsa_key.pem"
public_access_key = "/var/lib/zm_api/keys/public_access_rsa_key.pem"
private_refresh_key = "/var/lib/zm_api/keys/private_refresh_rsa_key.pem"
public_refresh_key = "/var/lib/zm_api/keys/public_refresh_rsa_key.pem"

[http]
timeout = 10
