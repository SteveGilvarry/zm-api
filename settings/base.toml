[server]
addr = "0.0.0.0"
port = 8080

[server.tls]
enabled = false
cert_path = "/etc/letsencrypt/live/example.com/fullchain.pem"
key_path = "/etc/letsencrypt/live/example.com/privkey.pem"

[server.acme]
enabled = false
domains = []
contact_emails = []
cache_dir = "/var/lib/zm_api/acme"
production = false
challenge = "tls-alpn-01"
http_port = 80

# HTTP middleware tuning.
[server.middleware]
# Maximum accepted request body size, in bytes (2 MiB).
body_limit_bytes = 2097152
# Per-client-IP rate limit. 0 disables rate limiting; enable in prod.toml.
rate_limit_per_second = 0
rate_limit_burst = 0

# Database configuration
# By default, uses ZoneMinder's zm.conf settings (/etc/zm/zm.conf + conf.d/)
# Override here or via environment variables (APP_DB__HOST, etc.) if needed
[db]
# These placeholder values trigger zm.conf fallback
host = "localhost"
port = 3306
username = "username"
password = "password"
database_name = "database_name"
# Connection pool tuning.
max_connections = 25
min_connections = 5
connect_timeout_secs = 8
acquire_timeout_secs = 8
idle_timeout_secs = 300
max_lifetime_secs = 1800
# Log every SQL statement. Verbose; enable only for local debugging.
sqlx_logging = false

[sentry]
# Sentry error reporting - disabled by default for privacy
# Users can enable and provide their own DSN if desired
enabled = false
dsn = ""

[env]
RUST_LOG = "info"
[secret]
private_access_key = "static/key/private_access_rsa_key.pem"
public_access_key = "static/key/public_access_rsa_key.pem"
private_refresh_key = "static/key/private_refresh_rsa_key.pem"
public_refresh_key = "static/key/public_refresh_rsa_key.pem"

[http]
timeout = 10

# Streaming configuration for RTSP/WebRTC/HLS
[streaming]
enabled = true
default_protocol = "auto"

[streaming.source]
priority = ["socket", "rtsp", "go2rtc"]
prefer_direct_rtsp = false
fallback_to_go2rtc = true
cache_sdp_seconds = 300
# Keep these monitors' stream-socket readers hot so the first WebRTC/HLS viewer
# skips cold spin-up (instant codec + a ready keyframe). Empty = none.
prewarm_monitors = []
# How often the warm-keeper re-ensures each prewarm reader is alive. 0 disables.
prewarm_interval_seconds = 30

[streaming.zoneminder]
enabled = true
# Directory holding zmc's per-monitor stream sockets (ZM_PATH_SOCKS):
# {socks_path}/stream_{monitor_id}.sock
socks_path = "/run/zm"
read_timeout_ms = 10000
reconnect_delay_ms = 1000

[streaming.go2rtc]
enabled = false
base_url = "http://localhost:1984"
timeout_seconds = 10
auto_register = true
health_check_interval_seconds = 30
retry_attempts = 3

[streaming.webrtc]
enabled = true
mode = "go2rtc"
max_connections = 100
connection_timeout_seconds = 30
stun_servers = ["stun:stun.l.google.com:19302", "stun:stun1.l.google.com:19302"]

[streaming.hls]
enabled = true
segment_duration_seconds = 2
playlist_size = 10
ll_hls_enabled = true
partial_segment_ms = 200

[streaming.hls.storage]
path = "/tmp/hls"
retention_minutes = 10

[streaming.rtsp_proxy]
enabled = false
port = 8554
rtp_port_range_start = 20000
rtp_port_range_end = 30000
max_sessions = 100
transport = "auto"

# Motion-synopsis optimiser + renderer + serving.
# Disabled by default: ingest still records review_assets manifests, but nothing
# renders until enabled. The encoder is always in-process ffmpeg-next (libav*);
# zm-api never shells out to the ffmpeg binary.
[synopsis]
enabled = false
encoder_backend = "native"
render_timeout_seconds = 120
max_concurrent_renders = 2
# Days a rendered artifact is kept before the cleanup job removes it (0 = keep).
retention_days = 7
cache_dir = "/var/lib/zm_api/synopsis"
# Output synopsis frame rate for the rendered mp4.
output_fps = 12
# Cap on tubes drawn into one output frame (0 = unlimited).
max_tubes_per_frame = 8
# Collision-area budget as a fraction of tube pixels — the condensation knob
# (0.02–0.10). Higher = denser/shorter; lower = sparser/longer.
collision_budget = 0.05
# Mask edge feather radius in pixels (1–2) to suppress cutout halos.
mask_feather_px = 1
# Monitor ids whose zm-next pipeline emits synopsis ingredients (polygon masks +
# tracker + review_export + plate_export). Empty = none; other cameras pay nothing.
enabled_monitors = []

# Natural-language / semantic event search over zm-next events. Off by default.
# All model inference is external local HTTP (chosen by URL, not in-process ONNX).
[search]
enabled = "off"        # off | auto | on  (auto = enable iff a vector backend is found)
backend = "auto"       # auto -> sqlite today (MySQL 8.0 has no native VECTOR); mariadb|postgres later
embed_dim = 384        # Matryoshka-truncate to 256-384
sqlite_path = "/var/lib/zm_api/search.db"
rerank = true
embed_url = "http://127.0.0.1:8090/embed"    # text(+image) embeddings (TEI/llama.cpp/Ollama)
rerank_url = "http://127.0.0.1:8090/rerank"  # cross-encoder reranker
router_url = "http://127.0.0.1:8091/v1"      # OpenAI-compatible LLM for the query router
router_model = "local"                       # model name for the router endpoint (often ignored)
image_embed = false    # also embed on-disk crop JPEGs (off = text-only)

# Daemon controller configuration (replaces zmdc.pl/zmpkg.pl)
[daemon]
# Passive by default: run as a REST API alongside stock ZoneMinder without
# touching its daemons. Flip to true (and disable zoneminder.service) only when
# you want zm_api to take over daemon supervision. See packaging/zm_api-takeover.sh.
enabled = false
socket_path = "/run/zm"
socket_name = "zmdc.sock"
# On Ubuntu/Debian, both binaries and scripts are in /usr/bin
bin_path = "/usr/bin"
script_path = "/usr/bin"
min_backoff_seconds = 5
max_backoff_seconds = 900
shutdown_timeout_seconds = 30
stats_update_interval_seconds = 60
enable_socket_ipc = true
enable_rest_api = true

[retention]
# Automatic recording-disk cleanup. Deletes whole events (media + DB rows)
# oldest-first, per Storage, when any limit below is breached. Off by default;
# never touches Archived or in-progress events, or the newest event per monitor.
enabled = false
interval_seconds = 300
# Disk-full safety net: keep each storage's filesystem at least this % free.
min_free_pct = 10.0
# 0 = disabled. Delete events older than N days.
max_age_days = 0
# 0 = disabled. Hard byte cap per storage.
max_bytes = 0
# Log what would be deleted without deleting (eyeball before enforcing).
dry_run = false
