name: CLA Assistant

# Ensures every pull-request author has agreed to the Contributor License
# Agreement (CLA.md) before their contribution can be merged. Signatures are
# recorded in this repository (signatures/version1/cla.json on the
# `cla-signatures` branch) — the project owns its own signature ledger.

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  cla:
    runs-on: ubuntu-latest
    steps:
      - name: CLA Assistant
        if: >-
          (github.event.comment.body == 'recheck' ||
           github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA') ||
          github.event_name == 'pull_request_target'
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          path-to-signatures: signatures/version1/cla.json
          path-to-document: https://github.com/SteveGilvarry/zm-api/blob/master/CLA.md
          branch: cla-signatures
          # Bots never need to sign.
          allowlist: dependabot[bot],github-actions[bot]
          custom-notsigned-prcomment: >-
            Thank you for your pull request. Before it can be merged, please
            agree to the [Contributor License Agreement](https://github.com/SteveGilvarry/zm-api/blob/master/CLA.md).
          custom-pr-sign-comment: >-
            I have read the CLA Document and I hereby sign the CLA
          custom-allsigned-prcomment: >-
            All contributors have signed the CLA. ✅
