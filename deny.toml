# cargo-deny configuration — see https://embarkstudios.github.io/cargo-deny/
#
# Run locally with: cargo deny check

[advisories]
version = 2
# RUSTSEC advisory IDs to ignore, with a justification comment each.
ignore = []

[bans]
# The dependency tree currently carries some duplicate versions via
# transitive crates; surface them as warnings rather than hard failures.
multiple-versions = "warn"
wildcard-dependencies = "warn"

[licenses]
version = 2
# Permissive licenses acceptable for this project's dependency tree.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "Zlib",
    "MPL-2.0",
    "CC0-1.0",
    "OpenSSL",
    "BSL-1.0",
]
confidence-threshold = 0.8

[sources]
unknown-registry = "warn"
unknown-git = "warn"
