# cargo-deny configuration — see https://embarkstudios.github.io/cargo-deny/
#
# Run locally with: cargo deny check

[advisories]
version = 2
# RUSTSEC advisory IDs to ignore, with a justification comment each.
ignore = [
    # rsa "Marvin Attack" timing side-channel. No fixed `rsa` release exists and
    # the crate is pulled in transitively (and unavoidably) by sqlx-mysql for the
    # MariaDB/MySQL auth handshake — it is not used for any attacker-facing crypto
    # in zm_api. Exploitation requires timing many RSA private-key operations;
    # mitigated by a local/TLS database connection. Revisit when sqlx drops rsa.
    "RUSTSEC-2023-0071",
    # atomic-polyfill unmaintained. Deep transitive build-dep only
    # (garde -> phonenumber -> postcard -> heapless), no safe upgrade available.
    "RUSTSEC-2023-0089",
]

[bans]
# The dependency tree currently carries some duplicate versions via
# transitive crates; surface them as warnings rather than hard failures.
multiple-versions = "warn"
wildcards = "warn"

[licenses]
version = 2
# Permissive licenses acceptable for this project's dependency tree.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "Zlib",
    "MPL-2.0",
    "CC0-1.0",
    "OpenSSL",
    "BSL-1.0",
    # zm_api's own license (the workspace crate is scanned too).
    "AGPL-3.0-or-later",
    # Permissive licenses carried by transitive deps.
    "CDLA-Permissive-2.0",
    "WTFPL",
]
confidence-threshold = 0.8

[sources]
unknown-registry = "warn"
unknown-git = "warn"
